services:
  postgres:
    image: postgres:latest
    container_name: pt_search_hos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pt_search_hos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database_setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
      - ./database_insert.sql:/docker-entrypoint-initdb.d/02_insert.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pt_search_hos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pt_search_hos_app
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pt_search_hos
      JWT_SECRET: change-me-in-production
      APP_PORT: 3456
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pt_search_hos_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
